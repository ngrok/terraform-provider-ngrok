name: CI

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./... -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      # tfplugindocs is pinned in go.mod (tool directive) and run via `go tool`,
      # so docs regeneration is reproducible and can be drift-checked in CI.
      - name: Regenerate docs
        run: make docs
      - name: Verify committed docs are up to date
        run: |
          git diff --exit-code -- docs/ || { \
            echo "::error::Docs are out of date. Run 'make docs' and commit the result."; \
            exit 1; \
          }
      # The provider name must be passed explicitly: the module/repo name
      # (terraform-provider-ngrok-v1.0) is not a valid provider local name
      # because of the dot, so name inference fails.
      - name: Validate docs
        run: make docs-validate

  codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      # Codegen tools are pinned in go.mod (tool directives); `make codegen`
      # runs them via `go tool`, so no separate install step is needed.
      - run: make codegen
      - name: Verify generated code is up to date
        run: |
          git diff --exit-code || { \
            echo "::error::Generated code is out of date. Run 'make codegen' and commit the result."; \
            exit 1; \
          }
